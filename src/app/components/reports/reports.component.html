<div class="p-6 max-w-6xl mx-auto bg-white shadow-md rounded-lg">
  <div class="flex items-center space-x-2 mb-6">
    <ng-icon name="lucideFileText" class="h-6 w-6 text-blue-600"></ng-icon>
    <h2 class="text-2xl font-bold text-gray-800">Reportes</h2>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    @for (option of reportOptions; track option.route) {
      <a 
        [routerLink]="option.route" 
        class="block p-6 bg-white border-2 border-gray-200 rounded-lg hover:border-{{ option.color }}-300 hover:shadow-lg transition-all duration-200 cursor-pointer group"
      >
        <div class="flex items-start space-x-4">
          <div class="flex-shrink-0">
            <div class="p-3 bg-{{ option.color }}-100 rounded-lg group-hover:bg-{{ option.color }}-200 transition-colors">
              <ng-icon [name]="option.icon" class="h-8 w-8 text-{{ option.color }}-600"></ng-icon>
            </div>
          </div>
          <div class="flex-1">
            <h3 class="text-lg font-semibold text-gray-900 mb-2">{{ option.title }}</h3>
            <p class="text-gray-600 text-sm">{{ option.description }}</p>
          </div>
        </div>
      </a>
    }
  </div>

  <div class="mt-8 p-4 bg-gray-50 rounded-lg border border-gray-200">
    <p class="text-sm text-gray-600">
      <strong class="text-gray-800">Tip:</strong> 
      Seleccione el tipo de reporte que desea gestionar. Podrá ver, crear y descargar informes en formato PDF y Excel.
    </p>
  </div>
</div>
